{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update this transaction</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('edit_expense', id=expense['id']) }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00" value="{{ form.amount|default('') }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        {% for c in categories %}
                        <option value="{{ c }}" {% if form.category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input" value="{{ form.date|default('') }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description <span>(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g. Groceries"
                           value="{{ form.description|default('') }}">
                </div>
                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('transactions') }}">Cancel</a>
        </p>

    </div>
</section>

{% endblock %}
